services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dm_tracker
      POSTGRES_PASSWORD: dm_tracker_pass
      POSTGRES_DB: dm_tracker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dm_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    env_file: .env
    environment:
      WAHA_DEFAULT_SESSION_CONFIG_WEBHOOKS_0_URL: http://host.docker.internal:3000/api/v1/webhooks/waha
      WAHA_DEFAULT_SESSION_CONFIG_WEBHOOKS_0_EVENTS: message,session.status
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./.sessions:/app/.sessions

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override host-local URLs with Docker-internal addresses
      DATABASE_URL: postgresql://dm_tracker:dm_tracker_pass@postgres:5432/dm_tracker?schema=public
      REDIS_URL: redis://redis:6379
      WAHA_API_URL: http://waha:3000
      WAHA_WEBHOOK_URL: https://dm.your-homelab.com/api/v1/webhooks/waha
      PUBLIC_BASE_URL: https://dm.your-homelab.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
