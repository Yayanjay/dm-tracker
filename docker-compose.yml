services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kawalgula
      POSTGRES_PASSWORD: kawalgula_pass
      POSTGRES_DB: kawalgula
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kawalgula"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kawalgula:kawalgula_pass@postgres:5432/kawalgula?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:3011:3000"
    volumes:
      - ./.sessions:/app/.sessions

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prisma-studio:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "5555:5555"
    entrypoint: ["npx"]
    command: ["prisma", "studio", "--schema", "packages/prisma/schema.prisma", "--hostname", "0.0.0.0", "--port", "5555"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
